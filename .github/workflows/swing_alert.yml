name: Swing Trade Alert

on:
  schedule:
    - cron: "30 3 * * 1-5"   # 9:00 AM IST
    - cron: "30 12 * * 1-5"  # 6:00 PM IST
  workflow_dispatch:

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner and send alert
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python main.py

      # ✅ Commit dashboard to repo (for GitHub Pages)
      - name: Commit dashboard to repo
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add dashboard.html results.json || true
          git commit -m "Update dashboard" || echo "No changes"
          git push

      # ✅ Upload artifact (optional download)
      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-${{ github.run_number }}
          path: |
            dashboard.html
            results.json
          retention-days: 7

      # ✅ Save watchlist state
      - name: Commit watchlist state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add watchlist_state.json || true
          git diff --staged --quiet || git commit -m "update watchlist state"
          git push || true