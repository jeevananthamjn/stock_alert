name: Swing Trade Alert

on:
  schedule:
    # 9:00 AM IST = 3:30 AM UTC
    - cron: "30 3 * * 1-5"
    # 6:00 PM IST = 12:30 PM UTC
    - cron: "30 12 * * 1-5"
  workflow_dispatch:  # allow manual trigger

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner and send alert
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python main.py

      - name: Upload dashboard artifact
      
      - name: Commit dashboard to repo
    run: |
    git config --global user.name "github-actions"
    git config --global user.email "actions@github.com"
    git add dashboard.html
    git commit -m "Update dashboard" || echo "No changes"
    git push
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-${{ github.run_number }}
          path: |
            dashboard.html
            results.json
          retention-days: 7

      - name: Commit watchlist state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add watchlist_state.json || true
          git diff --staged --quiet || git commit -m "chore: update watchlist state [skip ci]"
          git push || true
